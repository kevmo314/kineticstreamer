name: Go tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: app/src/main/go/go.sum

      # The host CGO build of srt.go / rist.go links against system-installed
      # libsrt and librist (paths hardcoded in #cgo directives). Install them.
      - name: Install host libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsrt-openssl-dev librist-dev

      - name: Install host libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install srt librist

      # `go test ./...` would try to build cmd/jni, which is Android-only
      # (its CGO links libandroid / liblog). Test only the root kinetic
      # package on the host.
      - name: go test
        working-directory: app/src/main/go
        run: go test -v -timeout 120s .

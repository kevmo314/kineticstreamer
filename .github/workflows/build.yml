name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: app/src/main/go/go.sum

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r27c

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build meson

      # macos-latest is Apple Silicon and the NDK r27 toolchain is darwin-x86_64.
      # Install Rosetta 2 so the cross-compiler binaries can execute.
      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
          for formula in cmake ninja meson; do
            brew list --formula "$formula" >/dev/null 2>&1 || brew install "$formula"
          done

      - name: Set up MSYS2 OpenSSL tools (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2.31.1
        with:
          install: make perl

      # Windows OpenSSL Android builds need Unix-style Perl and make from the
      # same MSYS2 toolchain. Git Bash's Perl omits required core modules, and
      # native Windows Perl is rejected by OpenSSL's Android configure logic.
      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress ninja meson
          "C:\Program Files\Meson" | Out-File -FilePath $env:GITHUB_PATH -Append
          "OPENSSL_PERL=C:/msys64/usr/bin/perl.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache third-party C deps
        uses: actions/cache@v5.0.5
        with:
          path: app/src/main/go/third_party/output
          key: third-party-${{ matrix.os }}-ndk-r27c-${{ hashFiles('app/build.gradle.kts', 'app/src/main/go/third_party/CMakeLists.txt', 'app/src/main/go/build.sh', 'app/src/main/go/build.ps1') }}

      - name: Build with Gradle
        shell: bash
        run: ./gradlew assembleDebug --info --stacktrace
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # Only upload from Linux. macOS/Windows runs are just verifying the build works.
      - name: Upload APK
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
